<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Kyo — Concept 1: VOX</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    color-scheme: dark;
    --bg: #010502;
    --ph: #2dff88;          /* phosphor */
    --ph-hot: #d6ffe9;
    --ph-dim: rgba(45,255,136,0.45);
    --ph-faint: rgba(45,255,136,0.14);
    --mono: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ph); font-family: var(--mono); }
  body { overflow: hidden; }

  /* CRT plumbing: scanlines + vignette + slow flicker */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 2px, rgba(0,0,0,0.22) 2px 3px);
    mix-blend-mode: multiply;
  }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9;
    background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
    animation: crtFlicker 6s steps(1,end) infinite;
  }
  @keyframes crtFlicker { 0%,93%,100% {opacity:1;} 94% {opacity:0.92;} 95% {opacity:1;} 97% {opacity:0.95;} 98% {opacity:1;} }

  .app {
    height: 100dvh; max-width: 440px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 10px;
    padding: max(16px, env(safe-area-inset-top)) 16px max(14px, env(safe-area-inset-bottom));
    position: relative; z-index: 1;
    text-shadow: 0 0 6px rgba(45,255,136,0.55);
  }

  /* boot header */
  .boot { font-size: 11px; letter-spacing: 0.08em; line-height: 1.6; color: var(--ph-dim); }
  .boot b { color: var(--ph); font-weight: 700; }
  .boot .ok { color: var(--ph-hot); }
  .cursor { display: inline-block; width: 7px; height: 13px; background: var(--ph); vertical-align: -2px; animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 0%,55% {opacity:1;} 56%,100% {opacity:0;} }

  /* ===== KYO = THE WAVEFORM ===== */
  .stage { position: relative; height: 190px; display: grid; place-items: center; margin-top: 4px; }
  .stage .frame {
    position: absolute; inset: 0;
    border-top: 1px solid var(--ph-faint); border-bottom: 1px solid var(--ph-faint);
  }
  .stage .tag {
    position: absolute; top: 6px; left: 0; font-size: 10px; letter-spacing: 0.28em; color: var(--ph-dim);
  }
  .stage .st {
    position: absolute; top: 6px; right: 0; font-size: 10px; letter-spacing: 0.28em; color: var(--ph-hot);
  }
  canvas#wave { width: 100%; height: 150px; display: block; filter: drop-shadow(0 0 8px rgba(45,255,136,0.7)); }

  /* transcript = terminal log */
  .log {
    flex: 1; min-height: 0; overflow-y: auto;
    font-size: 13.5px; line-height: 1.75; padding: 2px 2px 8px;
    scrollbar-width: none;
  }
  .log::-webkit-scrollbar { display: none; }
  .row-kyo  { color: var(--ph-hot); word-wrap: break-word; }
  .row-kyo .pfx { color: var(--ph); font-weight: 700; }
  .row-you  { color: var(--ph-dim); }
  .row-sys  { color: var(--ph-dim); font-size: 11px; letter-spacing: 0.1em; }
  .typing::after { content: '▮'; animation: blink 0.9s steps(1) infinite; }

  /* composer = bare terminal line */
  .composer { display: flex; align-items: center; gap: 8px; border-top: 1px dashed var(--ph-faint); padding-top: 10px; }
  .composer .pfx { color: var(--ph); font-weight: 700; }
  .composer input {
    flex: 1; min-width: 0; background: transparent; border: 0; outline: none;
    color: var(--ph-hot); font-family: var(--mono); font-size: 14px; caret-color: var(--ph);
    text-shadow: 0 0 6px rgba(45,255,136,0.55);
  }
  .composer input::placeholder { color: var(--ph-dim); }
  .composer button {
    background: transparent; border: 1px solid var(--ph-dim); color: var(--ph);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; padding: 6px 12px; cursor: pointer;
  }
  .composer button:hover { background: var(--ph-faint); color: var(--ph-hot); }

  /* push-to-talk: bracket REC control */
  .micline { display: grid; place-items: center; padding: 8px 0 2px; }
  .mic {
    background: transparent; border: 0; cursor: pointer; color: var(--ph);
    font-family: var(--mono); font-size: 14px; letter-spacing: 0.3em; padding: 14px 22px; position: relative;
    text-shadow: 0 0 8px rgba(45,255,136,0.6);
  }
  .mic::before, .mic::after { position: absolute; top: 50%; transform: translateY(-50%); font-size: 26px; color: var(--ph-dim); transition: color .2s; }
  .mic::before { content: '['; left: 0; }
  .mic::after  { content: ']'; right: 0; }
  .mic:hover::before, .mic:hover::after { color: var(--ph-hot); }
  .mic .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: var(--ph); margin-right: 10px; vertical-align: 1px; }
  [data-state="listening"] .mic { color: var(--ph-hot); }
  [data-state="listening"] .mic .dot { background: #ff4d4d; box-shadow: 0 0 12px #ff4d4d; animation: recPulse 0.9s ease-in-out infinite; }
  @keyframes recPulse { 0%,100% {transform: scale(1);} 50% {transform: scale(1.5);} }

  /* state chips (demo controls) */
  .chips { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
  .chips button {
    background: transparent; border: 1px solid var(--ph-faint); color: var(--ph-dim);
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; padding: 5px 9px; cursor: pointer;
  }
  .chips button:hover, .chips button.on { border-color: var(--ph); color: var(--ph-hot); background: var(--ph-faint); }

  .foot { display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 0.2em; color: var(--ph-dim); border-top: 1px solid var(--ph-faint); padding-top: 8px; }
</style>
</head>
<body data-state="idle">
  <main class="app">
    <div class="boot">
      <div><b>KYO://VOX</b> — synesthetic terminal <span class="ok">[OK]</span></div>
      <div>stt:browser · tts:elevenlabs · link:<b>HERMES</b> <span id="linkst">… standby</span> <span class="cursor"></span></div>
    </div>

    <section class="stage" aria-label="Kyo voice specter">
      <div class="frame"></div>
      <div class="tag">SIGNAL//KYO</div>
      <div class="st" id="status">IDLE</div>
      <canvas id="wave" width="820" height="300"></canvas>
    </section>

    <section class="log" id="log">
      <div class="row-sys">— session 0x2F3A · kyo v0.2.3 · concept VOX —</div>
      <div class="row-kyo"><span class="pfx">KYO&gt;</span> Lawd... what're we fixin' today?</div>
    </section>

    <form class="composer" id="composer">
      <span class="pfx">&gt;</span>
      <input id="in" type="text" placeholder="type to kyo_" autocomplete="off" />
      <button type="submit">SEND</button>
    </form>

    <div class="micline">
      <button class="mic" id="mic" aria-label="Push to talk"><span class="dot"></span>PUSH·TO·TALK</button>
    </div>

    <div class="chips" aria-label="Demo states">
      <button data-s="idle" class="on">IDLE</button>
      <button data-s="listening">LISTEN</button>
      <button data-s="thinking">THINK</button>
      <button data-s="speaking">SPEAK</button>
      <button id="demo">▶ RUN DEMO</button>
    </div>

    <div class="foot"><span>KYO v0.2.3 — CONCEPT 1 «VOX»</span><span>PHOSPHOR/CRT</span></div>
  </main>

<script>
  const body = document.body;
  const status = document.getElementById('status');
  const log = document.getElementById('log');
  const linkst = document.getElementById('linkst');
  let speakAmp = 0;

  const LABEL = { idle:'IDLE', listening:'REC ●', thinking:'PARSING…', speaking:'TRANSMIT' };
  function setState(s){
    body.dataset.state = s;
    status.textContent = LABEL[s];
    document.querySelectorAll('.chips [data-s]').forEach(b => b.classList.toggle('on', b.dataset.s === s));
    linkst.textContent = s === 'idle' ? '… standby' : '● live';
  }

  /* ---- the body: an oscilloscope ribbon ---- */
  const cv = document.getElementById('wave');
  const cx = cv.getContext('2d');
  let t = 0, noise = new Array(64).fill(0);
  function draw(){
    const W = cv.width, H = cv.height, mid = H/2;
    cx.clearRect(0,0,W,H);
    const s = body.dataset.state;
    t += 0.035;
    speakAmp *= 0.90;
    for (let i=0;i<noise.length;i++) noise[i] = noise[i]*0.82 + (Math.random()-0.5)*(s==='listening'?34:6);

    cx.lineWidth = 3;
    cx.strokeStyle = '#2dff88';
    cx.shadowColor = '#2dff88';
    cx.shadowBlur = 18;
    cx.beginPath();
    for (let x=0; x<=W; x+=4) {
      const p = x/W;
      let y = 0;
      if (s === 'idle') {
        y = Math.sin(p*6.28*1.5 + t) * 10 * (0.6+0.4*Math.sin(t*0.5));
      } else if (s === 'listening') {
        const edge = Math.min(p, 1-p)*2;
        y = noise[Math.floor(p*63)] * (1.2-edge) + Math.sin(p*40 - t*6)*4;
      } else if (s === 'thinking') {
        y = Math.sin(p*6.28*3 + t*3) * Math.cos(p*6.28*2 - t*2) * 34;
      } else if (s === 'speaking') {
        const env = 14 + speakAmp;
        y = Math.sin(p*6.28*6 - t*9)*env*Math.sin(p*3.14) + noise[Math.floor(p*63)]*0.35;
      }
      x === 0 ? cx.moveTo(x, mid+y) : cx.lineTo(x, mid+y);
    }
    cx.stroke();

    if (s === 'thinking') { cx.setLineDash([6,10]); } else { cx.setLineDash([]); }
    requestAnimationFrame(draw);
  }
  draw();

  /* ---- terminal I/O ---- */
  function addRow(cls, html){
    const d = document.createElement('div');
    d.className = cls; d.innerHTML = html;
    log.appendChild(d); log.scrollTop = log.scrollHeight;
    return d;
  }
  function typeOut(el, text, done){
    let i = 0; el.classList.add('typing');
    (function tick(){
      if (i < text.length) {
        el.querySelector('.tx').textContent += text[i++];
        speakAmp = 18 + Math.random()*26;
        log.scrollTop = log.scrollHeight;
        setTimeout(tick, 24 + Math.random()*40);
      } else { el.classList.remove('typing'); done && done(); }
    })();
  }

  const REPLIES = [
    "Well now... you sure that thing ain't listenin'?",
    "That dog'll hunt. Gimme a tick to rig it up.",
    "I reckon the machine's awake. Don't touch nothin'.",
    "Shoot — easy fix. Even the toaster could do it, and I don't trust the toaster."
  ];
  let ri = 0;
  function kyoSpeak(text, after){
    setState('speaking');
    const row = addRow('row-kyo', '<span class="pfx">KYO&gt;</span> <span class="tx"></span>');
    typeOut(row, ' ' + text, () => { setState('idle'); after && after(); });
  }
  function converse(userText){
    addRow('row-you', '&gt; ' + userText.replace(/</g,'&lt;'));
    setState('thinking');
    setTimeout(() => kyoSpeak(REPLIES[ri++ % REPLIES.length]), 1300);
  }

  document.getElementById('composer').addEventListener('submit', e => {
    e.preventDefault();
    const v = document.getElementById('in').value.trim();
    if (!v) return; document.getElementById('in').value = '';
    converse(v);
  });
  document.getElementById('mic').addEventListener('click', () => {
    if (body.dataset.state === 'listening') { setState('idle'); return; }
    setState('listening');
    setTimeout(() => converse('(voice) hey kyo, you awake in there?'), 1800);
  });
  document.querySelectorAll('.chips [data-s]').forEach(b =>
    b.addEventListener('click', () => setState(b.dataset.s)));
  document.getElementById('demo').addEventListener('click', () => {
    setState('listening');
    setTimeout(() => converse('(voice) run us a demo, kyo'), 1600);
  });
</script>
</body>
</html>
