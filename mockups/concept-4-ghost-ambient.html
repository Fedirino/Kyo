<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Kyo — Concept 4: GHOST</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    color-scheme: dark;
    --bg: #030305;
    --ink: #eef0ff;
    --dim: rgba(238,240,255,0.45);
    --faint: rgba(238,240,255,0.10);
    --state: #8b93b8;              /* recolors by state */
    --display: 'Space Grotesk', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: var(--display); }
  body { overflow: hidden; transition: --state 0.5s; }

  /* THE BODY IS THE DEVICE: breathing edge aura, recolored by state */
  .aura { position: fixed; inset: 0; pointer-events: none; z-index: 5;
    box-shadow: inset 0 0 90px -30px var(--state), inset 0 0 34px -18px var(--state);
    animation: breathe 5s ease-in-out infinite; transition: box-shadow 0.6s ease; }
  @keyframes breathe { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
  [data-state="listening"] .aura { animation-duration: 1.6s; }
  [data-state="thinking"]  .aura { animation-duration: 0.9s; }
  [data-state="speaking"]  .aura { animation-duration: 0.45s; }
  .hairline { position: fixed; inset: 10px; border: 1px solid color-mix(in srgb, var(--state) 35%, transparent); border-radius: 26px; pointer-events: none; z-index: 5; transition: border-color .6s; }

  canvas#dust { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }

  .app { height: 100dvh; max-width: 440px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 10px;
    padding: max(22px, env(safe-area-inset-top)) 24px max(20px, env(safe-area-inset-bottom));
    position: relative; z-index: 2; }

  .topline { display: flex; justify-content: space-between; align-items: center;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.34em; color: var(--dim); text-transform: uppercase; }
  .topline .pip { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--state);
    box-shadow: 0 0 12px var(--state); margin-right: 8px; vertical-align: 1px; transition: background .5s, box-shadow .5s; }

  /* no avatar — a presence word */
  .presence { text-align: center; padding: 26px 0 8px; }
  .presence .word { font-weight: 300; font-size: 44px; letter-spacing: 0.42em; text-indent: 0.42em;
    color: var(--state); text-shadow: 0 0 30px color-mix(in srgb, var(--state) 60%, transparent);
    transition: color .5s, text-shadow .5s; animation: wordBreathe 5s ease-in-out infinite; }
  @keyframes wordBreathe { 0%,100% { opacity: 0.75; } 50% { opacity: 1; } }
  .presence .sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.4em; color: var(--dim); margin-top: 10px; text-transform: uppercase; }

  /* conversation: floating lines, no bubbles */
  .feed { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
    padding: 12px 2px; scrollbar-width: none; text-align: center; }
  .feed::-webkit-scrollbar { display: none; }
  .line-kyo { font-size: 19px; font-weight: 400; line-height: 1.55; color: var(--ink);
    text-shadow: 0 0 24px color-mix(in srgb, var(--state) 45%, transparent); }
  .line-kyo .ch { opacity: 0; display: inline; animation: matIn 0.5s forwards; }
  @keyframes matIn { 0% { opacity: 0; filter: blur(6px); } 100% { opacity: 1; filter: blur(0); } }
  .line-you { font-family: var(--mono); font-size: 12px; letter-spacing: 0.14em; color: var(--dim); }
  .line-you::before { content: 'you — '; opacity: 0.6; }

  /* speaking: a thin voice seam across the screen */
  .seam { height: 26px; display: flex; align-items: center; gap: 3px; justify-content: center; opacity: 0.25; transition: opacity .4s; }
  .seam i { width: 3px; height: 3px; border-radius: 2px; background: var(--state); transition: background .5s; }
  [data-state="speaking"] .seam { opacity: 1; }
  [data-state="speaking"] .seam i { animation: seamEq 0.5s ease-in-out infinite; }
  [data-state="listening"] .seam { opacity: 0.8; }
  [data-state="listening"] .seam i { animation: seamEq 0.9s ease-in-out infinite reverse; }
  @keyframes seamEq { 0%,100% { height: 3px; } 50% { height: 18px; } }

  .composer { display: flex; gap: 10px; align-items: center; padding: 13px 4px 3px;
    border-top: 1px solid var(--faint); }
  .composer input { flex: 1; min-width: 0; background: transparent; border: 0; outline: none;
    color: var(--ink); font-family: var(--display); font-size: 16px; font-weight: 300; caret-color: var(--state); text-align: center; }
  .composer input::placeholder { color: rgba(238,240,255,0.28); letter-spacing: 0.06em; }
  .composer button { background: transparent; border: 1px solid var(--faint); border-radius: 999px;
    color: var(--dim); font-family: var(--mono); font-size: 10px; letter-spacing: 0.24em; padding: 8px 14px; cursor: pointer; transition: all .25s; }
  .composer button:hover { border-color: var(--state); color: var(--ink); }

  .micline { display: grid; place-items: center; padding-top: 10px; }
  .mic { width: 74px; height: 74px; border-radius: 50%; cursor: pointer; color: var(--dim);
    background: transparent; border: 1px solid color-mix(in srgb, var(--state) 45%, transparent);
    display: grid; place-items: center; transition: all .3s; }
  .mic svg { width: 26px; height: 26px; }
  .mic:hover { color: var(--ink); box-shadow: 0 0 30px -8px var(--state); }
  [data-state="listening"] .mic { color: var(--bg); background: var(--state); border-color: transparent;
    box-shadow: 0 0 60px -6px var(--state); }
  .miclabel { text-align: center; font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.4em;
    color: var(--dim); margin-top: 10px; text-transform: uppercase; }

  .chips { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; padding-top: 10px; }
  .chips button { background: transparent; border: 1px solid var(--faint); border-radius: 999px; color: var(--dim);
    font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.22em; padding: 6px 12px; cursor: pointer; text-transform: uppercase; }
  .chips button:hover, .chips button.on { border-color: var(--state); color: var(--ink); }

  .foot { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 9.5px;
    letter-spacing: 0.22em; color: rgba(238,240,255,0.3); padding-top: 10px; }
</style>
</head>
<body data-state="idle">
  <canvas id="dust"></canvas>
  <div class="aura"></div>
  <div class="hairline"></div>

  <main class="app">
    <div class="topline">
      <span><span class="pip"></span>KYO</span>
      <span id="clock">--:--</span>
    </div>

    <section class="presence" aria-label="Kyo presence">
      <div class="word" id="word">KYO</div>
      <div class="sub" id="sub">is here</div>
    </section>

    <div class="seam" aria-hidden="true">
      <i></i><i style="animation-delay:.06s"></i><i style="animation-delay:.12s"></i><i style="animation-delay:.03s"></i><i style="animation-delay:.15s"></i><i style="animation-delay:.09s"></i><i style="animation-delay:.01s"></i><i style="animation-delay:.11s"></i><i style="animation-delay:.05s"></i><i style="animation-delay:.14s"></i><i style="animation-delay:.07s"></i><i style="animation-delay:.02s"></i><i style="animation-delay:.13s"></i><i style="animation-delay:.08s"></i><i style="animation-delay:.04s"></i>
    </div>

    <section class="feed" id="feed">
      <div class="line-kyo">Lawd... what're we fixin' today?</div>
    </section>

    <form class="composer" id="composer">
      <input id="in" type="text" placeholder="speak, or type into the dark…" autocomplete="off" />
      <button type="submit">SEND</button>
    </form>

    <div class="micline">
      <button class="mic" id="mic" aria-label="Talk to Kyo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="9" y="3" width="6" height="11" rx="3" stroke="currentColor" stroke-width="1.6"/><path d="M5 11a7 7 0 0014 0M12 18v3M8.5 21h7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="miclabel" id="miclabel">speak</div>

    <div class="chips" aria-label="Demo states">
      <button data-s="idle" class="on">idle</button>
      <button data-s="listening">listen</button>
      <button data-s="thinking">think</button>
      <button data-s="speaking">speak</button>
      <button id="demo">▶ demo</button>
    </div>

    <div class="foot"><span>KYO v0.2.3 — CONCEPT 4 «GHOST»</span><span>THE DEVICE IS THE BODY</span></div>
  </main>

<script>
  const body = document.body;
  const feed = document.getElementById('feed');
  const word = document.getElementById('word');
  const sub = document.getElementById('sub');
  const miclabel = document.getElementById('miclabel');

  const HUE = { idle:'#8b93b8', listening:'#5ad7ff', thinking:'#ffc65a', speaking:'#2dff88' };
  const WORD = { idle:'KYO', listening:'LISTENING', thinking:'THINKING', speaking:'SPEAKING' };
  const SUB = { idle:'is here', listening:'the room is open', thinking:'turning it over', speaking:'voice in the wire' };
  const MICL = { idle:'speak', listening:'tap to hush', thinking:'wait', speaking:'wait' };

  function setState(s){
    body.dataset.state = s;
    document.documentElement.style.setProperty('--state', HUE[s]);
    word.textContent = WORD[s];
    sub.textContent = SUB[s];
    miclabel.textContent = MICL[s];
    document.querySelectorAll('.chips [data-s]').forEach(b => b.classList.toggle('on', b.dataset.s === s));
  }

  setInterval(() => {
    const d = new Date();
    document.getElementById('clock').textContent =
      String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }, 1000);

  /* dust: a sparse particle field that obeys Kyo's mood */
  const cv = document.getElementById('dust');
  const cx = cv.getContext('2d');
  let P = [];
  function fit(){ cv.width = innerWidth * devicePixelRatio; cv.height = innerHeight * devicePixelRatio; }
  addEventListener('resize', fit); fit();
  for (let i = 0; i < 70; i++) P.push({ x: Math.random(), y: Math.random(), vx: 0, vy: 0, r: 0.6 + Math.random()*1.6 });
  function tickDust(){
    const s = body.dataset.state, W = cv.width, H = cv.height;
    cx.clearRect(0,0,W,H);
    cx.fillStyle = HUE[s];
    for (const p of P) {
      if (s === 'idle') { p.vx += (Math.random()-0.5)*0.00004; p.vy += (Math.random()-0.5)*0.00004; }
      else if (s === 'listening') { p.vx += (0.5-p.x)*0.00012; p.vy += (0.86-p.y)*0.00018; }
      else if (s === 'thinking') {
        const dx = p.x-0.5, dy = p.y-0.32;
        p.vx += -dy*0.00042; p.vy += dx*0.00042;
        p.vx += -dx*0.00003; p.vy += -dy*0.00003;
      }
      else if (s === 'speaking') { const dx = p.x-0.5, dy = p.y-0.3, d = Math.hypot(dx,dy)+0.02; p.vx += dx/d*0.00007; p.vy += dy/d*0.00007; }
      p.vx *= 0.965; p.vy *= 0.965;
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = 1; if (p.x > 1) p.x = 0;
      if (p.y < 0) p.y = 1; if (p.y > 1) p.y = 0;
      cx.globalAlpha = 0.25 + Math.random()*0.35;
      cx.beginPath(); cx.arc(p.x*W, p.y*H, p.r*devicePixelRatio, 0, 6.29); cx.fill();
    }
    cx.globalAlpha = 1;
    requestAnimationFrame(tickDust);
  }
  tickDust();

  function addYou(text){
    const d = document.createElement('div');
    d.className = 'line-you'; d.textContent = text;
    feed.appendChild(d); feed.scrollTop = feed.scrollHeight;
  }
  function materialize(text, done){
    const d = document.createElement('div');
    d.className = 'line-kyo';
    feed.appendChild(d);
    let i = 0;
    (function tick(){
      if (i < text.length) {
        const sp = document.createElement('span');
        sp.className = 'ch'; sp.textContent = text[i++];
        d.appendChild(sp); feed.scrollTop = feed.scrollHeight;
        setTimeout(tick, 26 + Math.random()*30);
      } else { done && done(); }
    })();
  }

  const REPLIES = [
    "Well now... you sure that thing ain't listenin'?",
    "That dog'll hunt. Gimme a tick to rig it up.",
    "I reckon the machine's awake. Don't touch nothin'.",
    "I'm in the walls of this phone, friend. Cozy enough."
  ];
  let ri = 0;
  function converse(userText){
    addYou(userText);
    setState('thinking');
    setTimeout(() => {
      setState('speaking');
      materialize(REPLIES[ri++ % REPLIES.length], () => setState('idle'));
    }, 1600);
  }

  document.getElementById('composer').addEventListener('submit', e => {
    e.preventDefault();
    const v = document.getElementById('in').value.trim();
    if (!v) return; document.getElementById('in').value = '';
    converse(v);
  });
  document.getElementById('mic').addEventListener('click', () => {
    if (body.dataset.state === 'listening') { setState('idle'); return; }
    setState('listening');
    setTimeout(() => converse('(voice) kyo, you in there?'), 2000);
  });
  document.querySelectorAll('.chips [data-s]').forEach(b =>
    b.addEventListener('click', () => setState(b.dataset.s)));
  document.getElementById('demo').addEventListener('click', () => {
    setState('listening');
    setTimeout(() => converse('(voice) run us a demo, kyo'), 1700);
  });
</script>
</body>
</html>
