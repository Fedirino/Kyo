<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kyo</title>
  <meta name="theme-color" content="#050505" />
  <link rel="manifest" href="/manifest.json" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --text: #f5f2ea;
      --muted: rgba(245,242,234,0.7);
      --shadow: 0 0 30px rgba(255,138,31,0.22), 0 0 100px rgba(255,138,31,0.12);
      --radius: 28px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: radial-gradient(circle at 50% 35%, rgba(255,138,31,0.12), transparent 30%), var(--bg); color: var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { overflow: hidden; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 24px 18px 30px;
      gap: 16px;
      max-width: 520px;
      margin: 0 auto;
    }
    .topline { display: flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; }
    .pill { padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
    .hero { position: relative; display: grid; place-items: center; align-content: center; gap: 18px; }
    .avatar-wrap { position: relative; width: min(74vw, 340px); aspect-ratio: 1; display: grid; place-items: center; }
    .avatar-glow { position: absolute; inset: 10%; border-radius: 50%; background: radial-gradient(circle, rgba(255,177,92,0.22), rgba(255,138,31,0.06) 42%, transparent 70%); filter: blur(6px); animation: breathe 4s ease-in-out infinite; }
    .avatar { position: relative; width: 56%; height: 56%; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #ffca86 0%, #ff9d3f 18%, #ff7c12 52%, #7d2600 100%); box-shadow: var(--shadow); animation: pulse 2.8s ease-in-out infinite; }
    .spike { position: absolute; left: 50%; top: 50%; width: 42%; height: 7px; transform-origin: 0 50%; }
    .spike::before { content: ''; display: block; width: 100%; height: 100%; border-radius: 999px; background: linear-gradient(90deg, rgba(255,196,126,0.95), rgba(255,138,31,0.95)); box-shadow: 0 0 18px rgba(255,138,31,0.4); opacity: 0.95; }
    .spike:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg) translateX(110%); }
    .spike:nth-child(2) { transform: translate(-50%, -50%) rotate(36deg) translateX(110%); }
    .spike:nth-child(3) { transform: translate(-50%, -50%) rotate(72deg) translateX(110%); }
    .spike:nth-child(4) { transform: translate(-50%, -50%) rotate(108deg) translateX(110%); }
    .spike:nth-child(5) { transform: translate(-50%, -50%) rotate(144deg) translateX(110%); }
    .spike:nth-child(6) { transform: translate(-50%, -50%) rotate(180deg) translateX(110%); }
    .spike:nth-child(7) { transform: translate(-50%, -50%) rotate(216deg) translateX(110%); }
    .spike:nth-child(8) { transform: translate(-50%, -50%) rotate(252deg) translateX(110%); }
    .spike:nth-child(9) { transform: translate(-50%, -50%) rotate(288deg) translateX(110%); }
    .spike:nth-child(10){ transform: translate(-50%, -50%) rotate(324deg) translateX(110%); }
    .status { min-height: 24px; color: var(--muted); font-size: 15px; text-align: center; }
    .mic-shell { display: grid; place-items: center; padding-top: 10px; }
    .mic { width: 84px; height: 84px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.14); background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.25), rgba(255,138,31,0.16) 34%, rgba(255,138,31,0.85) 100%); box-shadow: 0 0 0 10px rgba(255,138,31,0.08), 0 0 50px rgba(255,138,31,0.35); display: grid; place-items: center; color: white; font-size: 30px; cursor: pointer; transition: transform 0.15s ease, box-shadow 0.2s ease; }
    .mic:active { transform: scale(0.97); box-shadow: 0 0 0 14px rgba(255,138,31,0.12), 0 0 60px rgba(255,138,31,0.5); }
    .footer { display: flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: 12px; }
    .transcript { min-height: 72px; padding: 14px 16px; border-radius: var(--radius); background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); color: rgba(245,242,234,0.92); box-shadow: 0 10px 40px rgba(0,0,0,0.35); }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    @keyframes breathe { 0%,100% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.03); opacity: 1; } }
  </style>
</head>
<body>
  <main class="app">
    <div class="topline">
      <div class="pill">Kyo</div>
      <div class="pill">Voice-first companion</div>
    </div>
    <section class="hero" aria-label="Kyo assistant">
      <div class="avatar-wrap">
        <div class="avatar-glow"></div>
        <div class="avatar" id="avatar">
          <span class="spike"></span><span class="spike"></span><span class="spike"></span><span class="spike"></span><span class="spike"></span>
          <span class="spike"></span><span class="spike"></span><span class="spike"></span><span class="spike"></span><span class="spike"></span>
        </div>
      </div>
      <div class="status" id="status">Ready to listen.</div>
      <div class="status" id="config-note" style="font-size:12px; opacity:.72;">Firebase: not wired yet</div>
    </section>
    <section class="transcript" id="transcript">Say something to Kyo. Keep it short for now — the visual system comes first.</section>
    <section class="mic-shell">
      <button class="mic" id="mic" aria-label="Talk to Kyo">🎙</button>
    </section>
    <div class="footer">
      <span>v0.1 scaffold</span>
      <span>Mobile-first</span>
    </div>
  </main>
  <script>
    const status = document.getElementById('status');
    const transcript = document.getElementById('transcript');
    const mic = document.getElementById('mic');
    mic.addEventListener('click', () => {
      status.textContent = 'Listening...';
      transcript.textContent = 'This is where Kyo will hear you, think, and answer.';
      setTimeout(() => status.textContent = 'Thinking...', 700);
      setTimeout(() => status.textContent = 'Speaking...', 1400);
    });
  </script>
</body>
</html>
